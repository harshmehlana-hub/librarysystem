<!DOCTYPE html>
<html>
<head>
  <title>Library BST</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>📚 Library Management System</h1>

  <div class="grid">

    <div class="card">
      <h2>Add Book</h2>
      <input id="id" placeholder="Book ID">
      <input id="title" placeholder="Book Title">
      <button onclick="addBook()">Add Book</button>
    </div>

    <div class="card">
      <h2>Search Book</h2>
      <input id="searchId" placeholder="Enter Book ID">
      <button onclick="searchBook()">Search</button>
      <p id="result"></p>
    </div>

    <div class="card full">
      <h2>📖 All Books (BST Sorted)</h2>
      <button onclick="loadBooks()">Load Books</button>
      <ul id="bookList"></ul>
    </div>

  </div>
</div>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
